# =============================================================================
# LOGSTASH PIPELINE — CloudTrail S3 Ingestion
# =============================================================================
# This pipeline:
#   1. Pulls CloudTrail JSON log files from S3
#   2. Parses the nested JSON structure (CloudTrail wraps events in a "Records" array)
#   3. Extracts key fields for detection rule queries
#   4. Normalizes timestamps
#   5. Outputs to Elasticsearch with daily index rotation
#
# CloudTrail JSON structure:
#   { "Records": [ { "eventVersion": "1.08", "eventName": "CreateUser", ... }, ... ] }
#
# Each file contains multiple events in the Records array. The split filter
# breaks them into individual events for indexing.
# =============================================================================

input {
  s3 {
    bucket           => "${CLOUDTRAIL_BUCKET}"
    region           => "${AWS_REGION}"
    access_key_id    => "${AWS_ACCESS_KEY_ID}"
    secret_access_key => "${AWS_SECRET_ACCESS_KEY}"

    # Only read CloudTrail JSON files (skip digest files)
    prefix           => "AWSLogs/"
    exclude_pattern  => ".*CloudTrail-Digest.*"

    # How often to check for new files (seconds)
    interval         => 60

    # Track which files have been read so we don't re-process on restart
    sincedb_path     => "/usr/share/logstash/sincedb/s3_sincedb"

    # Codec: read raw text (we'll parse JSON in the filter)
    codec            => "plain"

    # Add metadata about the S3 source
    additional_settings => {
      force_path_style => true
    }
  }
}

filter {
  # -------------------------------------------------------------------------
  # Step 1: Parse the outer CloudTrail JSON envelope
  # -------------------------------------------------------------------------
  json {
    source => "message"
    target => "cloudtrail_raw"
  }

  # -------------------------------------------------------------------------
  # Step 2: Split the Records array into individual events
  # Each CloudTrail file contains multiple events in Records[]
  # -------------------------------------------------------------------------
  if [cloudtrail_raw][Records] {
    split {
      field => "[cloudtrail_raw][Records]"
    }

    # Move the individual record to the root for easier field access
    ruby {
      code => '
        record = event.get("[cloudtrail_raw][Records]")
        if record.is_a?(Hash)
          record.each do |k, v|
            event.set(k, v)
          end
        end
      '
    }
  }

  # -------------------------------------------------------------------------
  # Step 3: Parse and normalize the event timestamp
  # CloudTrail timestamps are in ISO 8601 format: 2025-03-10T16:26:38Z
  # -------------------------------------------------------------------------
  if [eventTime] {
    date {
      match => ["eventTime", "ISO8601"]
      target => "@timestamp"
      timezone => "UTC"
    }
  }

  # -------------------------------------------------------------------------
  # Step 4: Extract and flatten key fields for detection queries
  # These are the fields your detection rules will query against
  # -------------------------------------------------------------------------

  # Flatten userIdentity for easier querying
  if [userIdentity] {
    ruby {
      code => '
        ui = event.get("userIdentity")
        if ui.is_a?(Hash)
          event.set("user_type", ui["type"])
          event.set("user_arn", ui["arn"])
          event.set("user_account_id", ui["accountId"])
          event.set("user_principal_id", ui["principalId"])
          event.set("user_name", ui.dig("userName") || ui.dig("sessionContext", "sessionIssuer", "userName"))
          event.set("user_invokedBy", ui["invokedBy"])

          # Extract MFA info if present
          if ui.dig("sessionContext", "attributes")
            event.set("mfa_authenticated", ui.dig("sessionContext", "attributes", "mfaAuthenticated"))
          end

          # Extract access key ID if present
          if ui.dig("accessKeyId")
            event.set("access_key_id", ui["accessKeyId"])
          end
        end
      '
    }
  }

  # Extract error information (important for detecting denied actions)
  if [errorCode] {
    mutate {
      add_field => { "has_error" => "true" }
    }
  } else {
    mutate {
      add_field => { "has_error" => "false" }
    }
  }

  # Extract additional event data (MFA status for console logins)
  if [additionalEventData] {
    ruby {
      code => '
        aed = event.get("additionalEventData")
        if aed.is_a?(Hash)
          event.set("mfa_used", aed["MFAUsed"]) if aed["MFAUsed"]
          event.set("login_to", aed["LoginTo"]) if aed["LoginTo"]
        end
      '
    }
  }

  # Extract request parameters for specific detections
  if [requestParameters] {
    ruby {
      code => '
        rp = event.get("requestParameters")
        if rp.is_a?(Hash)
          # For IAM key creation detection
          event.set("request_user_name", rp["userName"]) if rp["userName"]

          # For S3 bucket policy detection
          event.set("request_bucket_name", rp["bucketName"]) if rp["bucketName"]
          event.set("request_bucket_policy", rp["bucketPolicy"].to_s) if rp["bucketPolicy"]

          # For policy attachment detection
          event.set("request_policy_arn", rp["policyArn"]) if rp["policyArn"]

          # For security group detection
          if rp["ipPermissions"]
            event.set("request_ip_permissions", rp["ipPermissions"].to_s)
          end
        end
      '
    }
  }

  # -------------------------------------------------------------------------
  # Step 5: Categorize events by MITRE ATT&CK relevance
  # This pre-tags events to make detection queries faster
  # -------------------------------------------------------------------------
  ruby {
    code => '
      event_name = event.get("eventName")
      return unless event_name

      tags = []

      # Credential Access indicators
      if ["CreateAccessKey", "CreateLoginProfile", "UpdateLoginProfile"].include?(event_name)
        tags << "credential_manipulation"
      end

      # Privilege Escalation indicators
      if ["AttachUserPolicy", "AttachRolePolicy", "AttachGroupPolicy",
          "PutUserPolicy", "PutRolePolicy", "PutGroupPolicy",
          "CreatePolicyVersion", "SetDefaultPolicyVersion"].include?(event_name)
        tags << "privilege_escalation"
      end

      # Defense Evasion indicators
      if ["StopLogging", "DeleteTrail", "UpdateTrail", "PutEventSelectors",
          "DeleteFlowLogs", "DeleteDetector", "DisableOrganizationAdminAccount"].include?(event_name)
        tags << "defense_evasion"
      end

      # Data Access / Exfiltration indicators
      if ["PutBucketPolicy", "PutBucketAcl", "PutBucketPublicAccessBlock",
          "GetObject", "PutObject", "CopyObject"].include?(event_name)
        tags << "data_access"
      end

      # Persistence indicators
      if ["CreateUser", "CreateRole", "CreateGroup",
          "AuthorizeSecurityGroupIngress", "AuthorizeSecurityGroupEgress"].include?(event_name)
        tags << "persistence"
      end

      # Console login tracking
      if event_name == "ConsoleLogin"
        tags << "console_login"
      end

      # Root account usage
      if event.get("user_type") == "Root"
        tags << "root_activity"
      end

      event.set("mitre_tags", tags) unless tags.empty?
    '
  }

  # -------------------------------------------------------------------------
  # Step 6: Clean up — remove raw/temporary fields
  # -------------------------------------------------------------------------
  mutate {
    remove_field => ["message", "cloudtrail_raw", "@version"]
  }
}

output {
  # -------------------------------------------------------------------------
  # Output to Elasticsearch with daily index rotation
  # Index pattern: cloudtrail-YYYY.MM.DD
  # -------------------------------------------------------------------------
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "cloudtrail-%{+YYYY.MM.dd}"

    # Template to optimize field mappings for CloudTrail data
    template_name => "cloudtrail"
    template_overwrite => true
    template => "/usr/share/logstash/pipeline/cloudtrail-template.json"
  }

  # Uncomment for debugging — prints parsed events to Logstash stdout
  # stdout {
  #   codec => rubydebug
  # }
}
